# LLM backend: ollama (local) or gemini (Google AI API key).
llm:
  provider: gemini
  # Optional shared HTTP timeouts (seconds); provider blocks can override (see ollama / gemini).
  # timeout_chat_s: 300
  # timeout_generate_s: 600
  # Per-run caps for remote providers (Gemini). When any limit is set, MeteredLLMProvider wraps API calls.
  # Raise limits if you process very large PDFs (inventory uses one vision request per page).
  remote_guard:
    max_chat_requests_per_run: 45
    max_generate_requests_per_run: 150
    max_llm_requests_per_run: 220
    max_total_token_count_per_run: 400000
    warn_token_threshold: 120000

# Gemini (Google AI). Set llm.provider: gemini and GOOGLE_API_KEY (or gemini.api_key_env).
# Use current stable model IDs (gemini-2.0-flash is deprecated and may return 404 — see AI Studio docs).
gemini:
  api_key_env: GOOGLE_API_KEY
  # Reasoning loop (tool JSON): Flash keeps latency/cost low.
  reasoning_model: gemini-2.5-flash
  # Vision (inventory, extraction, visual compliance): stronger model → better field quality; higher cost.
  vision_model: gemini-2.5-pro
  timeout_generate_s: 600
  # Optional: merge/override llm.remote_guard for Gemini-only stricter caps, e.g. max_generate_requests_per_run: 120

ollama:
  base_url: "http://localhost:11434"

  # Vision model — used for page classification, field extraction, and visual compliance checks.
  # qwen2.5vl:32b  → ~24 GB RAM  | strong invoice/OCR accuracy, fits with reasoning model  ← RECOMMENDED
  # qwen2.5vl:72b  → ~57 GB RAM  | best accuracy, run alone or with a tiny reasoning model
  # qwen2.5vl:7b   → ~6 GB RAM   | current default, weakest on dense tables
  vision_model: "qwen2.5vl:32b"         # ollama pull qwen2.5vl:32b

  # Reasoning model — used only for the agentic loop (tool selection, JSON routing).
  # Speed and JSON reliability matter more than raw intelligence here.
  # qwen3:1.7b     → ~2 GB RAM   | #1 tool-calling accuracy in class (score 0.960)  ← RECOMMENDED
  # qwen3:4b       → ~2.5 GB RAM | slightly higher accuracy ceiling, more headroom
  # qwen2.5:7b     → ~5 GB RAM   | current default, older generation
  reasoning_model: "qwen3:1.7b"         # ollama pull qwen3:1.7b

  # Total RAM with both loaded: ~26 GB (fits easily in 96 GB)
  #
  # Request timeouts (seconds). Increase if your local models are slow under load.
  timeout_chat_s: 240
  timeout_generate_s: 420
  # Optional context caps passed to Ollama options.num_ctx.
  # Keep vision/generate lower to avoid huge KV-cache pressure on large VL models.
  num_ctx_chat: 8192
  num_ctx_generate: 16384

config_dir: "config/csv"

learnings_path: "learnings/learnings.md"

agent:
  max_turns: 30
  max_field_retries: 5
  confidence_threshold: 0.65      # below this → blocking human-review flag
  batch_review_threshold: 0.85    # between confidence_threshold and this → non-blocking batch review
  planning_enabled: true          # generate an execution plan before the main loop
  fallback_reasoning_model: null  # e.g. "qwen2.5:7b" — used after 2+ consecutive failures
  # Processing orchestration:
  # - "loop":     primary agentic mode (LLM chooses next tool call)
  # - "pipeline": deterministic debug fallback
  orchestration: "loop"
  # Agentic profile:
  # - "patterned": macro/composite behavior (default for stable runs)
  # - "detailed":  finer-grained tool usage (OCR/crop/localization-heavy)
  loop_profile: "patterned"

  # Tool exposure for the LLM (loop mode only).
  # Defaults for patterned profile:
  # - pipeline group ON (stable composite tool surface)
  # - granular group OFF (unless you explicitly want detailed micro-tools)
  # - learnings CRUD tools hidden (agent reads hydrated learnings context)
  tool_groups_enabled: ["pipeline"]
  tools_extra_allow: []
  tools_extra_deny: ["install_package"]
  learnings_tools_enabled: false

  # Prompt sizing: auto uses larger caps for remote LLM (e.g. Gemini), smaller for Ollama.
  # Omit or set learnings/history keys to null to use profile defaults; explicit integers override.
  prompt_profile: auto
  learnings_inject_enabled: true
  # Richer learnings context for remote (Gemini) runs; raises input tokens slightly.
  learnings_max_chars: 16000
  planning_learnings_max_chars: null

  # Logging preview caps (0 = unlimited for console logs).
  log_line_max_chars: 250
  # Tool-output preview in recent-actions JSON (remote profile default ~900).
  history_preview_chars: 900

  # State summary in each agent turn: avoid huge prompts on multi-page PDFs.
  state_summary_max_page_lines: 28
  state_summary_max_inventory_lines: 50
  state_summary_inventory_desc_chars: 180

  # Max characters of Surya OCR text injected into vision extraction prompts (full page + crops).
  ocr_prompt_max_chars: 24000
  # Multi-page visual compliance: max page images sent in one visual call.
  visual_max_evidence_pages: 8

  # Compliance rule groups (see rule_group column in config/csv/compliance_rules.csv).
  # Chad / non-Galicia field projects: general only (no Xunta stamp, 2023 window, PR811A, etc.).
  # For Galicia grant paperwork, add: - xunta_galicia
  active_rule_groups:
    - general

  # Ground truth CSV: compared after every run when a row matches the PDF (or use <stem>_truth.json).
  # Prefer ISO dates (YYYY-MM-DD) in the CSV; slash dates use ground_truth_date_parse for ambiguous days/months.
  #
  # Scoring uses ONLY columns listed below AND only field_names that exist for the detected invoice_type_id
  # (see config/csv/extraction_fields.csv). Example: "travel_purpose" is ignored for PERS_LOCAL, so payroll rows
  # should map payroll columns to employee_name, pay_period, etc.
  ground_truth_csv_path: "config/csv/ground_truth.csv"
  # Optional per-invoice-type CSV (takes precedence over ground_truth_csv_path when set).
  # ground_truth_csv_by_invoice_type:
  #   VIAJES: "config/csv/ground_truth_viajes.csv"
  ground_truth_csv_by_invoice_type: {}
  ground_truth_source_column: "Source file"
  # CSV column header -> extraction field_name (see config/csv/extraction_fields.csv).
  ground_truth_column_map:
    "Invoice Number": "invoice_number"
    "Date": "invoice_date"
    "Supplier/Issuer": "vendor_name"
    "Items/Services": "item_description"
    "Description": "travel_purpose"
    "Total Amount": "total_amount"
    "Currency": "currency"
    "Payment Method": "payment_method"
    "Expense Category": "expense_category"
    "Client Name": "beneficiary"
    "Employee": "employee_name"
    "Pay period": "pay_period"
  # Slash-delimited dates when day and month are both ≤12: DMY (EU) or MDY (US).
  ground_truth_date_parse: "DMY"

  # Optional phase 2 hooks (advanced recovery / more granular extraction).
  # Keep OFF for patterned profile.
  micro_tools_phase2: false

  # Batch auto-expansion: when true the agent silently adds un-attempted fields to every
  # extract_fields_vision call so they get a free ride in the same vision request.
  # Cuts total turns by 60-70%. Set to false to extract exactly the fields the agent
  # requests and nothing more (useful for debugging or very large schemas).
  batch_auto_expand: true

  # Hybrid: medium-res first, then full-res when needed (saves some vision cost). Off = always full-res only.
  hybrid_extraction: false

  # Default DPI for convert_pdf_to_images when the agent omits dpi (higher = sharper, larger images, more vision tokens).
  page_dpi: 200
  planning_timeout_s: 180
  reflection_timeout_s: 120
  max_consecutive_failures: 3    # hard-stop a tool after this many back-to-back failures
  max_same_action_warn: 2        # warn after this many identical consecutive tool calls
  max_same_action_stop: 5        # hard-stop the loop after this many identical calls

ocr:
  # Languages passed to surya OCR pre-pass (runs before every vision extraction call).
  # Uses BCP-47 codes. Add languages that appear in your invoices.
  # Install surya: pip install surya-ocr  (models ~300MB, downloaded on first run)
  langs: ["es", "en", "fr"]

output:
  base_dir: "output"
  include_page_crops: true               # save region crops for debugging

logging:
  level: "INFO"                          # DEBUG for verbose tool traces
